<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR 디버그 마스터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        #log.fullscreen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; }
        .camera-btn { transition: all 0.2s; }
        .camera-btn:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-md mx-auto bg-white p-4 rounded-xl shadow-lg">
        <h1 class="text-lg font-bold mb-3">QR 스캔 테스트 도구</h1>
        
        <button id="btnInit" class="w-full bg-blue-600 text-white p-3 rounded-lg mb-4 font-bold">1. 카메라 목록 가져오기</button>
        <div id="cameraList" class="space-y-2 mb-4"></div>

        <div id="reader" class="w-full bg-black rounded-lg overflow-hidden min-h-[300px]"></div>

        <div class="mt-4">
            <div class="flex justify-between items-center mb-1">
                <h2 class="text-xs font-bold text-gray-500">DEBUG LOG (클릭 시 전체화면)</h2>
                <button onclick="document.getElementById('log').innerHTML=''" class="text-[10px] bg-red-100 p-1 rounded">Clear</button>
            </div>
            <div id="log" onclick="this.classList.toggle('fullscreen')" class="bg-gray-900 text-green-400 p-3 h-40 overflow-y-auto text-[11px] rounded-lg font-mono cursor-pointer"></div>
        </div>
    </div>

    <script>
        const logDiv = document.getElementById('log');
        const readerDiv = document.getElementById('reader');
        const html5QrCode = new Html5Qrcode("reader");

        function logger(msg) {
            const time = new Date().toLocaleTimeString().split(' ')[1];
            const div = document.createElement('div');
            div.textContent = `[${time}] ${msg}`;
            logDiv.appendChild(div);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(msg);
        }

        document.getElementById('btnInit').addEventListener('click', async () => {
            logDiv.innerHTML = '';
            logger("권한 요청 및 목록 로딩 시작...");
            
            try {
                // 권한 선행 획득
                await Html5Qrcode.getCameras().catch(e => {
                    logger("권한 에러: " + e.message);
                    throw e;
                });
                
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(d => d.kind === 'videoinput');
                
                logger(`총 ${videoDevices.length}개 장치 발견`);
                
                document.getElementById('cameraList').innerHTML = '';
                videoDevices.forEach((d, i) => {
                    logger(`장치 ${i}: ${d.label || '알 수 없음'} (${d.deviceId.slice(0, 8)})`);
                    
                    if (!d.label.toLowerCase().includes('front')) {
                        const btn = document.createElement('button');
                        btn.className = "camera-btn w-full bg-gray-100 p-3 rounded border border-gray-300 text-xs";
                        btn.textContent = `후면 스캔: ${d.label || 'Camera ' + i}`;
                        btn.onclick = () => startScan(d.deviceId);
                        document.getElementById('cameraList').appendChild(btn);
                    }
                });
            } catch (err) {
                logger("치명적 에러: " + err.message);
            }
        });

        async function startScan(deviceId) {
            if (html5QrCode.isScanning) {
                await html5QrCode.stop();
                logger("기존 스캔 중지됨");
            }

            logger(`선택 장치: ${deviceId.slice(0, 8)}...`);
            
            const config = {
                fps: 5,
                qrbox: { width: 250, height: 250 },
                videoConstraints: {
                    deviceId: { exact: deviceId },
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                }
            };

            html5QrCode.start(
                { deviceId: { exact: deviceId } },
                config,
                (decodedText) => {
                    logger("성공: " + decodedText);
                    alert("인식 완료: " + decodedText);
                    html5QrCode.stop();
                },
                (err) => {
                    // 스캔 실패 에러는 너무 자주 발생하므로 로깅 최소화
                }
            ).then(() => {
                logger("카메라 스트림 시작 성공");
            }).catch(err => {
                logger(`시작 에러: ${err.name} - ${err.message}`);
                if(err.name === 'OverconstrainedError') {
                    logger("힌트: 해상도/렌즈 제약 위반입니다. 설정을 조정하세요.");
                }
            });
        }
    </script>
</body>
</html>
