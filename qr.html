<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>최적화된 QR 스캐너</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-lg font-bold mb-4">QR 스캔 서비스</h1>
        
        <button id="btnAutoScan" class="w-full bg-blue-600 text-white p-4 rounded-lg font-bold text-lg mb-4">스캔 시작하기</button>
        
        <div id="reader" class="w-full bg-black rounded-lg overflow-hidden min-h-[300px]"></div>
        
        <div id="log" class="mt-4 p-3 bg-gray-900 text-green-400 text-[10px] rounded h-32 overflow-y-auto font-mono"></div>
    </div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        const logDiv = document.getElementById('log');
        let backCameras = [];
        
        function logger(msg) { logDiv.innerHTML += `<div>> ${msg}</div>`; logDiv.scrollTop = logDiv.scrollHeight; }

        document.getElementById('btnAutoScan').addEventListener('click', async () => {
            logDiv.innerHTML = '';
            logger("카메라 장치 검색 중...");
            
            const devices = await Html5Qrcode.getCameras();
            // 후면 카메라만 필터링 (label에 back 포함)
            backCameras = devices.filter(d => d.label.toLowerCase().includes('back'));
            
            // 기존 성공 기록 확인
            const savedId = localStorage.getItem('lastWorkingCameraId');
            if (savedId) {
                logger("기존 성공 카메라로 즉시 시도...");
                tryScan(savedId);
            } else {
                tryAllCameras(0);
            }
        });

        async function tryAllCameras(index) {
            if (index >= backCameras.length) {
                logger("사용 가능한 후면 카메라를 찾지 못했습니다.");
                return;
            }
            
            const deviceId = backCameras[index].deviceId;
            logger(`카메라 ${index+1}/${backCameras.length} 테스트 중...`);
            
            try {
                await html5QrCode.start(
                    { deviceId: { exact: deviceId } },
                    { fps: 5, qrbox: 250 },
                    (text) => {
                        html5QrCode.stop();
                        localStorage.setItem('lastWorkingCameraId', deviceId);
                        alert("스캔 성공: " + text);
                        logger("성공! 설정 저장됨.");
                    }
                );
            } catch (err) {
                logger(`카메라 ${index+1} 실패, 다음 카메라 시도...`);
                await html5QrCode.stop().catch(e => {});
                tryAllCameras(index + 1);
            }
        }

        async function tryScan(deviceId) {
            try {
                await html5QrCode.start(
                    { deviceId: { exact: deviceId } },
                    { fps: 5, qrbox: 250 },
                    (text) => {
                        html5QrCode.stop();
                        alert("스캔 성공: " + text);
                    }
                );
            } catch (err) {
                logger("저장된 카메라 실패, 전체 목록 테스트 시작...");
                localStorage.removeItem('lastWorkingCameraId');
                tryAllCameras(0);
            }
        }
    </script>
</body>
</html>
