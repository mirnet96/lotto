<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal QR Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 고질적인 인식 오류가 있는 html5-qrcode 대신, 순수 픽셀 분석 엔진인 jsQR 사용 -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        .scan-line {
            position: absolute; width: 100%; height: 2px;
            background: rgba(79, 70, 229, 0.6); animation: scan 2s linear infinite;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body class="bg-slate-50 min-h-[100dvh] flex flex-col items-center justify-center p-6">

    <div id="welcome-ui" class="w-full max-w-md text-center">
        <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
            <h2 class="text-2xl font-bold text-slate-800 mb-4">로또 QR 스캐너</h2>
            <p class="text-slate-500 text-sm mb-8">모든 스마트폰 지원 모드 (S8-S25+ 완벽 대응)</p>
            <button id="start-btn" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-transform">
                스캔 시작하기
            </button>
        </div>
    </div>

    <div id="scanner-ui" class="hidden w-full max-w-md">
        <div class="relative bg-black rounded-3xl overflow-hidden aspect-square border-4 border-white">
            <!-- 성능과 호환성을 위해 표준 HTML5 비디오 태그 직접 사용 -->
            <video id="webcam" autoplay playsinline muted class="w-full h-full object-cover rounded-2xl"></video>
            <canvas id="hidden-canvas" class="hidden"></canvas>
            
            <div class="absolute inset-0 pointer-events-none flex items-center justify-center">
                <div class="w-64 h-64 border-2 border-indigo-400/30 rounded-2xl relative overflow-hidden shadow-[0_0_0_999px_rgba(0,0,0,0.5)]">
                    <div class="absolute -top-1 -left-1 w-8 h-8 border-t-4 border-l-4 border-indigo-500 rounded-tl-lg"></div>
                    <div class="absolute -top-1 -right-1 w-8 h-8 border-t-4 border-r-4 border-indigo-500 rounded-tr-lg"></div>
                    <div class="absolute -bottom-1 -left-1 w-8 h-8 border-b-4 border-l-4 border-indigo-500 rounded-bl-lg"></div>
                    <div class="absolute -bottom-1 -right-1 w-8 h-8 border-b-4 border-r-4 border-indigo-500 rounded-br-lg"></div>
                    <div class="scan-line"></div>
                </div>
            </div>
        </div>
        <button id="stop-btn" class="mt-6 w-full py-3 text-slate-500 font-semibold bg-white border border-slate-200 rounded-xl">취소</button>
    </div>

    <div id="result-ui" class="hidden w-full max-w-md bg-white p-6 rounded-3xl shadow-xl border-2 border-indigo-500 text-center">
        <div class="bg-slate-50 p-5 rounded-2xl mb-6 shadow-inner"><p id="qr-result" class="font-bold break-all"></p></div>
        <button onclick="location.reload()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold">다시 스캔</button>
    </div>

    <script>
        const welcomeUI = document.getElementById('welcome-ui');
        const scannerUI = document.getElementById('scanner-ui');
        const resultUI = document.getElementById('result-ui');
        const resultText = document.getElementById('qr-result');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('hidden-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        let localStream = null;
        let animationFrameId = null;

        // 성공 처리
        function onScanSuccess(text) {
            if (navigator.vibrate) navigator.vibrate(100);
            
            // 모든 스트림 및 루프 종료
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }

            scannerUI.classList.add('hidden');
            resultUI.classList.remove('hidden');
            resultText.innerText = text;
        }

        // 루프 돌며 실시간 픽셀 스캔 진행
        function scanTick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                // S25의 초고화질 화면을 인식에 가장 유리한 720p 크기의 캔버스로 리사이징 렌더링
                canvas.width = 1280;
                canvas.height = 720;
                
                // 비디오 화면을 캔버스에 그리기
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // 픽셀 데이터 추출
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                
                // jsQR 엔진으로 QR 매칭 시도
                const code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: "dontInvert",
                });

                if (code && code.data) {
                    onScanSuccess(code.data);
                    return;
                }
            }
            animationFrameId = requestAnimationFrame(scanTick);
        }

        startBtn.addEventListener('click', async () => {
            welcomeUI.classList.add('hidden');
            scannerUI.classList.remove('hidden');

            // S8과 S25 모두 무난하게 호환되는 최적화 조건
            const constraints = {
                audio: false,
                video: {
                    facingMode: "environment",
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            };

            try {
                // 네이티브 미디어 스트림 직접 연결
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = localStream;
                video.setAttribute("playsinline", true);
                video.play();
                
                // 스캔 분석 시작
                animationFrameId = requestAnimationFrame(scanTick);
            } catch (err) {
                console.error("카메라 연결 실패", err);
                alert("카메라를 켤 수 없습니다. 권한 혹은 HTTPS 환경을 확인해주세요.");
                location.reload();
            }
        });

        stopBtn.addEventListener('click', () => {
            location.reload();
        });
    </script>
</body>
</html>
