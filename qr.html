<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR 카메라 테스트 도구</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-xl font-bold mb-4">카메라 선택 테스트</h1>
        
        <button id="btnInit" class="w-full bg-blue-600 text-white p-3 rounded-lg mb-4 font-bold">1. 카메라 목록 가져오기</button>
        
        <div id="cameraList" class="space-y-2 mb-6"></div>

        <div id="reader" class="w-full bg-black rounded-lg overflow-hidden"></div>

        <div class="mt-6">
            <h2 class="text-sm font-semibold text-gray-500 mb-2">DEBUG LOG</h2>
            <div id="log" class="bg-gray-900 text-green-400 p-4 h-48 overflow-y-auto text-xs rounded-lg font-mono"></div>
        </div>
    </div>

    <script>
        const logDiv = document.getElementById('log');
        const cameraListDiv = document.getElementById('cameraList');
        let html5QrCode = new Html5Qrcode("reader");

        function logger(msg) {
            const div = document.createElement('div');
            div.textContent = `> ${msg}`;
            logDiv.appendChild(div);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // 1. 카메라 목록 호출
        document.getElementById('btnInit').addEventListener('click', async () => {
            try {
                // 권한 요청
                await Html5Qrcode.getCameras();
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(d => d.kind === 'videoinput');
                
                cameraListDiv.innerHTML = '';
                videoDevices.forEach(device => {
                    const btn = document.createElement('button');
                    btn.className = "w-full bg-gray-200 p-3 rounded border border-gray-300 text-sm active:bg-gray-300";
                    btn.textContent = device.label || `카메라 ${device.deviceId.slice(0, 5)}`;
                    btn.onclick = () => startScan(device.deviceId);
                    cameraListDiv.appendChild(btn);
                });
                logger("목록 로드 완료. 원하는 카메라를 클릭하세요.");
            } catch (err) {
                logger(`에러: ${err.message}`);
            }
        });

        // 2. 특정 카메라로 스캔 시작
        async function startScan(deviceId) {
            logger(`시도 중: ${deviceId}`);
            try {
                if (html5QrCode.isScanning) await html5QrCode.stop();
                
                await html5QrCode.start(
                    { deviceId: { exact: deviceId } },
                    { fps: 10, qrbox: 250 },
                    (decodedText) => {
                        alert(`QR 발견: ${decodedText}`);
                        logger(`성공: ${decodedText}`);
                    }
                );
                logger("스캐너 시작됨");
            } catch (err) {
                logger(`스캔 에러: ${err.message}`);
                // S25 등에서 OverconstrainedError 발생 시 힌트
                if(err.name === 'OverconstrainedError') {
                    logger("힌트: 이 카메라 렌즈는 해당 해상도를 지원하지 않을 수 있습니다.");
                }
            }
        }
    </script>
</body>
</html>
