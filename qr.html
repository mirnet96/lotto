<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>최적화된 QR 스캐너</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-lg font-bold mb-4">QR 스캔 서비스</h1>
        
        <button id="btnAutoScan" class="w-full bg-blue-600 text-white p-4 rounded-lg font-bold text-lg mb-2">스캔 시작하기</button>
        <button id="btnNextCam" class="hidden w-full bg-orange-500 text-white p-3 rounded-lg font-bold mb-4">스캔 안됨 → 다음 카메라로</button>
        
        <div id="reader" class="w-full bg-black rounded-lg overflow-hidden min-h-[300px]"></div>
        <div id="log" class="mt-4 p-3 bg-gray-900 text-green-400 text-[10px] rounded h-32 overflow-y-auto font-mono"></div>
    </div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        const logDiv = document.getElementById('log');
        const btnNextCam = document.getElementById('btnNextCam');
        let backCameras = [];
        let currentIndex = 0;
        
        function logger(msg) { logDiv.innerHTML += `<div>> ${msg}</div>`; logDiv.scrollTop = logDiv.scrollHeight; }

        // 카메라 목록 필터링 (후면만)
        async function getBackCameras() {
            const devices = await Html5Qrcode.getCameras();
            // label에 'front'가 없는 것만 필터링
            return devices.filter(d => !d.label.toLowerCase().includes('front'));
        }

        document.getElementById('btnAutoScan').addEventListener('click', async () => {
            logDiv.innerHTML = '';
            backCameras = await getBackCameras();
            logger(`총 ${backCameras.length}개의 후면 카메라 발견`);
            
            currentIndex = 0;
            const savedId = localStorage.getItem('lastWorkingCameraId');
            
            // 저장된 ID가 있으면 해당 ID의 인덱스를 찾음
            if (savedId) {
                const foundIndex = backCameras.findIndex(d => d.deviceId === savedId);
                currentIndex = foundIndex !== -1 ? foundIndex : 0;
                logger("저장된 카메라 시도 중...");
            }
            
            startCurrentCamera();
        });

        async function startCurrentCamera() {
            if (currentIndex >= backCameras.length) {
                logger("더 이상 테스트할 후면 카메라가 없습니다.");
                return;
            }

            const device = backCameras[currentIndex];
            logger(`테스트 중: ${device.label || '카메라 ' + currentIndex}`);
            btnNextCam.classList.remove('hidden');

            try {
                if (html5QrCode.isScanning) await html5QrCode.stop();
                
                await html5QrCode.start(
                    { deviceId: { exact: device.deviceId } },
                    { fps: 5, qrbox: 250 },
                    (text) => {
                        html5QrCode.stop();
                        localStorage.setItem('lastWorkingCameraId', device.deviceId);
                        alert("스캔 성공: " + text);
                        logger("성공! 설정 저장됨.");
                    }
                );
            } catch (err) {
                logger("시작 실패, 다음 버튼을 누르세요.");
            }
        }

        // 다음 카메라로 넘기기 버튼
        btnNextCam.addEventListener('click', async () => {
            await html5QrCode.stop().catch(e => {});
            currentIndex++;
            startCurrentCamera();
        });
    </script>
</body>
</html>
