<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR 스캐너 - 후면 카메라 우선</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-lg font-bold mb-4">후면 QR 스캐너</h1>
        
        <button id="btnAutoScan" class="w-full bg-blue-600 text-white p-4 rounded-lg font-bold text-lg mb-2">스캔 시작하기</button>
        <button id="btnNextCam" class="hidden w-full bg-orange-500 text-white p-3 rounded-lg font-bold mb-4">스캔 안됨 → 다음 후면 카메라로</button>
        
        <div id="reader" class="w-full bg-black rounded-lg overflow-hidden min-h-[300px]"></div>
        <div id="log" class="mt-4 p-3 bg-gray-900 text-green-400 text-[10px] rounded h-32 overflow-y-auto font-mono"></div>
    </div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        const logDiv = document.getElementById('log');
        const btnNextCam = document.getElementById('btnNextCam');
        let backCameras = [];
        let currentIndex = 0;
        
        function logger(msg) { 
            logDiv.innerHTML += `<div>> ${msg}</div>`; 
            logDiv.scrollTop = logDiv.scrollHeight; 
        }

        // 핵심 수정: Label 필터링 대신 환경(environment) 모드 사용
        async function getBackCameras() {
            const devices = await Html5Qrcode.getCameras();
            logger(`총 ${devices.length}개 장치 감지됨`);
            
            // 라벨에 의존하지 않고, 전체를 대상으로 시도하되 
            // 시스템이 'environment(후면)'로 인지하는 것을 우선순위로 둡니다.
            return devices; 
        }

        document.getElementById('btnAutoScan').addEventListener('click', async () => {
            logDiv.innerHTML = '';
            backCameras = await getBackCameras();
            currentIndex = 0;
            
            logger("카메라 테스트를 시작합니다...");
            startCurrentCamera();
        });

        async function startCurrentCamera() {
            if (currentIndex >= backCameras.length) {
                logger("모든 카메라 테스트 완료. 더 이상 장치가 없습니다.");
                return;
            }

            const device = backCameras[currentIndex];
            logger(`시도 중: ${device.label || '카메라 ' + currentIndex}`);
            btnNextCam.classList.remove('hidden');

            try {
                if (html5QrCode.isScanning) await html5QrCode.stop();
                
                await html5QrCode.start(
                    { deviceId: { exact: device.deviceId } },
                    { fps: 5, qrbox: 250 },
                    (text) => {
                        html5QrCode.stop();
                        localStorage.setItem('lastWorkingCameraId', device.deviceId);
                        alert("스캔 성공: " + text);
                    }
                );
            } catch (err) {
                logger(`카메라 ${currentIndex} 실패`);
            }
        }

        btnNextCam.addEventListener('click', async () => {
            await html5QrCode.stop().catch(e => {});
            currentIndex++;
            startCurrentCamera();
        });
    </script>
</body>
</html>
