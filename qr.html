<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile QR Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* 라이브러리 기본 UI를 숨기고 커스텀하기 위한 설정 */
        #qr-reader { border: none !important; }
        #qr-reader img { display: none !important; } /* 파일 업로드 아이콘 숨김 */
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-6">

    <!-- 안내 메시지 -->
    <div id="welcome-ui" class="w-full max-w-md text-center">
        <div class="mb-6 bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">QR 스캐너</h1>
            <p class="text-slate-500 mt-2">아래 버튼을 누르면 카메라 권한을 요청하며<br>스캔을 시작합니다.</p>
            
            <button id="start-btn" class="mt-8 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-200 transition-all active:scale-95">
                스캔 시작하기
            </button>
        </div>
    </div>

    <!-- 스캐너 영역 (초기엔 숨김) -->
    <div id="scanner-ui" class="hidden w-full max-w-md">
        <div class="relative bg-black rounded-3xl overflow-hidden shadow-2xl aspect-square">
            <div id="qr-reader" class="w-full"></div>
            <!-- 커스텀 가이드 UI -->
            <div class="absolute inset-0 border-[40px] border-black/40 pointer-events-none flex items-center justify-center">
                <div class="w-64 h-64 border-2 border-white/80 rounded-xl"></div>
            </div>
        </div>
        <button id="stop-btn" class="mt-6 w-full py-3 text-slate-500 font-medium">취소하고 돌아가기</button>
    </div>

    <!-- 결과창 -->
    <div id="result-ui" class="hidden w-full max-w-md bg-white p-6 rounded-3xl shadow-xl border-2 border-green-500">
        <div class="flex items-center space-x-2 text-green-600 mb-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
            </svg>
            <span class="font-bold uppercase text-sm tracking-widest">Success</span>
        </div>
        <p id="qr-result" class="text-xl font-semibold text-slate-800 break-all"></p>
        <button onclick="location.reload()" class="mt-6 w-full bg-slate-800 text-white py-3 rounded-xl font-bold">다시 시도</button>
    </div>

    <script>
        const welcomeUI = document.getElementById('welcome-ui');
        const scannerUI = document.getElementById('scanner-ui');
        const resultUI = document.getElementById('result-ui');
        const resultText = document.getElementById('qr-result');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');

        // 스캐너 인스턴스 (UI 없는 버전인 Html5Qrcode 사용)
        const html5QrCode = new Html5Qrcode("qr-reader");

        const qrConfig = { fps: 10, qrbox: { width: 250, height: 250 } };

        // 스캔 시작 버튼 클릭 시
        startBtn.addEventListener('click', () => {
            welcomeUI.classList.add('hidden');
            scannerUI.classList.remove('hidden');

            // 카메라 권한 요청 및 시작
            html5QrCode.start(
                { facingMode: "environment" }, // 후면 카메라 우선
                qrConfig,
                (decodedText) => {
                    // 스캔 성공 시
                    html5QrCode.stop().then(() => {
                        scannerUI.classList.add('hidden');
                        resultUI.classList.remove('hidden');
                        resultText.innerText = decodedText;
                        if (navigator.vibrate) navigator.vibrate(100);
                    });
                },
                (errorMessage) => {
                    // 스캔 중 에러 (무시)
                }
            ).catch(err => {
                // 권한 거부 또는 카메라 없음
                alert("카메라를 시작할 수 없습니다: " + err);
                location.reload();
            });
        });

        // 중지 버튼 클릭 시
        stopBtn.addEventListener('click', () => {
            html5QrCode.stop().then(() => {
                location.reload();
            });
        });
    </script>
</body>
</html>
