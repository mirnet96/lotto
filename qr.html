<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto flex flex-col gap-4">
        <div class="bg-white p-4 rounded-lg shadow">
            <button id="btnInit" class="w-full bg-blue-600 text-white py-4 rounded font-bold text-lg">카메라 목록 로드</button>
            <div id="cameraList" class="flex flex-col gap-2 mt-4"></div>
            <div id="reader" class="w-full mt-4 bg-black rounded overflow-hidden" style="min-height: 300px;"></div>
        </div>
        <div class="bg-gray-800 text-white p-4 rounded-lg h-32 overflow-y-auto font-mono text-xs" id="log"></div>
    </div>

    <script>
        const log = (m) => { 
            const l = document.getElementById('log');
            l.innerHTML += `<div>> ${m}</div>`; 
            l.scrollTop = l.scrollHeight;
        };

        const html5QrCode = new Html5Qrcode("reader");

        document.getElementById('btnInit').onclick = async () => {
            const btn = document.getElementById('btnInit');
            btn.disabled = true;
            btn.textContent = "권한 확인 중...";
            
            try {
                // 권한을 먼저 확실히 요청
                await Html5Qrcode.getCameras().then(devices => {
                    btn.textContent = "카메라 목록 로드 완료";
                    const list = document.getElementById('cameraList');
                    list.innerHTML = '';
                    
                    if (devices.length === 0) {
                        log("카메라를 찾을 수 없습니다.");
                        return;
                    }

                    devices.forEach((d, index) => {
                        const b = document.createElement('button');
                        b.className = "w-full p-4 bg-gray-200 rounded border border-gray-300 text-left";
                        b.textContent = `카메라 ${index + 1}: ${d.label || '알 수 없는 장치'}`;
                        b.onclick = () => startScanner(d.deviceId);
                        list.appendChild(b);
                    });
                });
            } catch (e) {
                log("오류: " + e.message);
                btn.disabled = false;
                btn.textContent = "카메라 목록 로드";
            }
        };

        async function startScanner(id) {
            log("카메라 시작 중...");
            try {
                if (html5QrCode.isScanning) {
                    await html5QrCode.stop();
                }
                
                await html5QrCode.start(
                    { deviceId: { exact: id } }, 
                    { fps: 10, qrbox: 250 }, 
                    (t) => { 
                        alert("인식 성공: " + t); 
                    }
                );
                log("스캔 시작됨");
            } catch (e) {
                log("시작 실패: " + e.message);
                // 실패 시 권한 문제일 수 있으므로 카메라 정보를 다시 비디오 모드로 시도해볼 수 있음
            }
        }
    </script>
</body>
</html>
