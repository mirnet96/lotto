<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal QR Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 고성능 순수 픽셀 분석 엔진 -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body class="bg-slate-50 min-h-[100dvh] flex flex-col items-center justify-center p-6">

    <div id="welcome-ui" class="w-full max-w-md text-center">
        <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
            <div class="w-20 h-20 bg-indigo-50 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h.01M16 20h2a2 2 2 0 002-2v-2a2 2 0 00-2-2h-2m-8 8H4a2 2 0 01-2-2v-2a2 2 0 012-2h2m0-8V4a2 2 0 012-2h2a2 2 0 012 2v2m0 8h.01M9 16H5a1 1 0 01-1-1V5a1 1 0 011-1h4a1 1 0 011 1v10a1 1 0 01-1 1zm10 0h-4a1 1 0 01-1-1V9a1 1 0 011-1h4a1 1 0 011 1v6a1 1 0 01-1 1z"></path>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-slate-800 mb-2">로또 QR 스캐너</h2>
            <p class="text-slate-400 text-sm mb-8">S8부터 S25까지 기종 불문 100% 스캔 보장 모드</p>
            
            <!-- 핵심 포인트: 스마트폰 카메라 촬영 및 앨범 선택을 유도하는 네이티브 인풋 -->
            <label class="block w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-transform cursor-pointer text-center">
                <span>로또 QR 촬영하기</span>
                <input type="file" id="qr-input" accept="image/*" capture="environment" class="hidden">
            </label>
        </div>
    </div>

    <!-- 로딩 UI -->
    <div id="loading-ui" class="hidden w-full max-w-md text-center">
        <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 flex flex-col items-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mb-4"></div>
            <p class="text-slate-600 font-medium">QR 코드를 분석하는 중입니다...</p>
        </div>
    </div>

    <!-- 결과 UI -->
    <div id="result-ui" class="hidden w-full max-w-md bg-white p-6 rounded-3xl shadow-xl border-2 border-indigo-500 text-center">
        <div class="bg-indigo-50 text-indigo-700 font-semibold py-2 px-4 rounded-full inline-block text-sm mb-4">스캔 성공</div>
        <div class="bg-slate-50 p-5 rounded-2xl mb-6 shadow-inner"><p id="qr-result" class="font-bold break-all text-slate-800"></p></div>
        <button onclick="location.reload()" class="w-full bg-slate-950 text-white py-4 rounded-xl font-bold active:scale-95 transition-transform">다시 스캔</button>
    </div>

    <!-- 비가시적 이미지 프로세싱용 캔버스 -->
    <canvas id="process-canvas" class="hidden"></canvas>

    <script>
        const welcomeUI = document.getElementById('welcome-ui');
        const loadingUI = document.getElementById('loading-ui');
        const resultUI = document.getElementById('result-ui');
        const resultText = document.getElementById('qr-result');
        const qrInput = document.getElementById('qr-input');
        const canvas = document.getElementById('process-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        qrInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            welcomeUI.classList.add('hidden');
            loadingUI.classList.remove('hidden');

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    // S25의 초고해상도 사진 결과물을 jsQR이 부하 없이 읽을 수 있는 최적 크기로 조절
                    // 가로세로 비율을 유지하면서 맥시멈 1000px 수준으로 리사이징합니다.
                    const maxDim = 1000;
                    let width = img.width;
                    let height = img.height;

                    if (width > maxDim || height > maxDim) {
                        if (width > height) {
                            height = Math.round((height * maxDim) / width);
                            width = maxDim;
                        } else {
                            width = Math.round((width * maxDim) / height);
                            height = maxDim;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);

                    try {
                        const imageData = ctx.getImageData(0, 0, width, height);
                        const code = jsQR(imageData.data, imageData.width, imageData.height, {
                            inversionAttempts: "dontInvert"
                        });

                        loadingUI.classList.add('hidden');

                        if (code && code.data) {
                            if (navigator.vibrate) navigator.vibrate(100);
                            resultUI.classList.remove('hidden');
                            resultText.innerText = code.data;
                        } else {
                            alert("QR 코드를 인식하지 못했습니다.\n조금 더 밝은 곳에서 QR 코드가 정면으로 크게 보이도록 다시 촬영해 주세요.");
                            location.reload();
                        }
                    } catch (err) {
                        loadingUI.classList.add('hidden');
                        alert("이미지 처리 중 오류가 발생했습니다. 다시 시도해 주세요.");
                        location.reload();
                    }
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
