<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-50 p-4">
    <!-- flex-col로 상하 배치 -->
    <div class="max-w-2xl mx-auto flex flex-col gap-4">
        <div class="bg-white p-4 rounded-lg shadow">
            <button id="btnInit" class="w-full bg-blue-600 text-white p-3 rounded mb-4 font-bold">카메라 목록 로드</button>
            <div id="cameraList" class="grid grid-cols-1 gap-2 mb-4"></div>
            <div id="reader" class="w-full rounded overflow-hidden"></div>
        </div>
        <div class="bg-gray-900 text-green-400 p-4 rounded-lg h-48 overflow-y-auto font-mono text-xs" id="log"></div>
    </div>

    <script>
        const log = (m) => { document.getElementById('log').innerHTML += `<div>> ${m}</div>`; console.log(m); };
        const html5QrCode = new Html5Qrcode("reader");

        document.getElementById('btnInit').onclick = async () => {
            try {
                const devs = await Html5Qrcode.getCameras();
                const list = document.getElementById('cameraList');
                list.innerHTML = '';
                
                if (devs.length === 0) log("카메라를 찾을 수 없습니다.");

                devs.forEach(d => {
                    // 후면 카메라 식별 로직 강화 (back, rear, environment 키워드 확인)
                    const isBack = /back|rear|environment/i.test(d.label);
                    
                    const btn = document.createElement('button');
                    // 후면 카메라일 경우 강조 표시
                    btn.className = `w-full p-2 text-sm rounded border ${isBack ? 'bg-green-100 border-green-500 font-bold' : 'bg-gray-200'}`;
                    btn.textContent = `${isBack ? '[후면] ' : ''}${d.label || '알 수 없는 카메라'}`;
                    btn.onclick = () => start(d.deviceId);
                    list.appendChild(btn);
                });
            } catch (e) {
                log("권한 오류 또는 오류 발생: " + e.message);
            }
        };

        const start = async (id) => {
            try {
                if(html5QrCode.isScanning) await html5QrCode.stop();
                html5QrCode.start(
                    { deviceId: { exact: id } }, 
                    { fps: 5, qrbox: 250 }, 
                    (t) => { alert("성공: " + t); }
                ).catch(e => log(e.message));
            } catch (e) {
                log("시작 실패: " + e.message);
            }
        };
    </script>
</body>
</html>
