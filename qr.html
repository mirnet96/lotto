<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S25 후면 카메라 전용 스캐너</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto flex flex-col gap-4">
        <div class="bg-white p-4 rounded-lg shadow">
            <button id="btnInit" class="w-full bg-blue-600 text-white py-3 rounded font-bold">1. 후면 카메라 검색</button>
            
            <select id="cameraSelect" class="w-full mt-4 p-2 border rounded">
                <option value="">후면 카메라를 선택하세요</option>
            </select>
            
            <button id="btnStart" class="w-full mt-2 bg-green-600 text-white py-3 rounded font-bold">2. 스캔 시작</button>
        </div>
        <div id="reader" class="w-full mt-4 bg-black rounded overflow-hidden" style="min-height: 300px;"></div>
    </div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");

        document.getElementById('btnInit').onclick = async () => {
            try {
                // 권한 요청
                await Html5Qrcode.getCameras(); 
                const devices = await Html5Qrcode.getCameras();
                const select = document.getElementById('cameraSelect');
                select.innerHTML = '<option value="">후면 카메라 선택</option>';
                
                // 'back' 또는 'environment'가 포함된 카메라만 필터링
                const backCameras = devices.filter(d => 
                    d.label.toLowerCase().includes('back') || 
                    d.label.toLowerCase().includes('후면')
                );

                backCameras.forEach((d) => {
                    const option = document.createElement('option');
                    option.value = d.id;
                    option.text = d.label || "후면 카메라";
                    select.appendChild(option);
                });

                if(backCameras.length === 0) alert("후면 카메라를 찾을 수 없습니다. (권한 확인 필요)");
            } catch (e) { alert("카메라 접근 불가: " + e.message); }
        };

        document.getElementById('btnStart').onclick = async () => {
            const cameraId = document.getElementById('cameraSelect').value;
            if (!cameraId) return alert("카메라를 선택하세요.");

            if (html5QrCode.isScanning) await html5QrCode.stop();

            await html5QrCode.start(
                { deviceId: { exact: cameraId } },
                { fps: 10, qrbox: 250 },
                (t) => { alert("인식 성공: " + t); }
            );
        };
    </script>
</body>
</html>
