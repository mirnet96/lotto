<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto flex flex-col gap-4">
        <div class="bg-white p-4 rounded-lg shadow">
            <button id="btnInit" class="w-full bg-blue-600 text-white py-4 rounded font-bold text-lg">카메라 초기화</button>
            <div class="flex gap-2 mt-4">
                <button onclick="startScanner('user')" class="flex-1 bg-green-600 text-white py-2 rounded">전면 사용</button>
                <button onclick="startScanner('environment')" class="flex-1 bg-red-600 text-white py-2 rounded">후면 사용</button>
            </div>
            <div id="reader" class="w-full mt-4 bg-black rounded overflow-hidden" style="min-height: 300px;"></div>
        </div>
        <div class="bg-gray-800 text-white p-4 rounded-lg h-32 overflow-y-auto font-mono text-xs" id="log"></div>
    </div>

    <script>
        const log = (m) => { 
            const l = document.getElementById('log');
            l.innerHTML += `<div>> ${m}</div>`; 
            l.scrollTop = l.scrollHeight;
        };

        const html5QrCode = new Html5Qrcode("reader");

        document.getElementById('btnInit').onclick = async () => {
            // 카메라 권한을 미리 요청
            try {
                await Html5Qrcode.getCameras();
                log("카메라 권한 획득 완료");
            } catch (e) {
                log("권한 오류: " + e.message);
            }
        };

        async function startScanner(mode) {
            log(mode === 'user' ? "전면 카메라 시작..." : "후면 카메라 시작...");
            try {
                if (html5QrCode.isScanning) {
                    await html5QrCode.stop();
                    await new Promise(r => setTimeout(r, 500));
                }
                
                // deviceId 대신 facingMode를 직접 사용하여 카메라 방향 지정
                await html5QrCode.start(
                    { facingMode: { exact: mode } }, 
                    { fps: 10, qrbox: 250 }, 
                    (t) => { alert("인식 성공: " + t); }
                );
                log("스캔 시작됨");
            } catch (e) {
                log("시작 실패 (기기가 해당 카메라를 지원하지 않을 수 있음): " + e.message);
            }
        }
    </script>
</body>
</html>
