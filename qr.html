<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR 디버깅 테스트</title>
    <style>
        body { font-family: sans-serif; padding: 10px; }
        #log { 
            background: #000; color: #0f0; padding: 10px; 
            height: 200px; overflow-y: auto; font-size: 12px; margin-top: 10px;
        }
        #video-container { margin-top: 10px; }
        video { width: 100%; max-width: 400px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<h3>카메라 디버깅 콘솔</h3>
<button onclick="startCamera()">카메라 테스트 시작</button>
<div id="log"></div>

<div id="video-container">
    <video id="preview" autoplay playsinline></video>
</div>

<script>
    const logDiv = document.getElementById('log');
    const video = document.getElementById('preview');

    function logger(msg) {
        const div = document.createElement('div');
        div.textContent = `> ${msg}`;
        logDiv.appendChild(div);
        logDiv.scrollTop = logDiv.scrollHeight;
        console.log(msg); // 여전히 콘솔에도 남김
    }

    async function startCamera() {
        logDiv.innerHTML = ''; // 로그 초기화
        logger("카메라 접근 시도 중...");

        try {
            // 1. 권한 먼저 확인
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            
            logger("권한 획득 성공!");
            video.srcObject = stream;

            // 2. 장치 확인
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoDevices = devices.filter(d => d.kind === 'videoinput');
            logger(`감지된 카메라 수: ${videoDevices.length}`);
            
            videoDevices.forEach((d, i) => {
                logger(`장치 ${i}: ${d.label || '알 수 없는 장치'}`);
            });

        } catch (err) {
            logger(`에러 발생: ${err.name}`);
            logger(`에러 메시지: ${err.message}`);
            
            // OverconstrainedError 상세 확인
            if (err.name === 'OverconstrainedError') {
                logger("힌트: 해상도나 제약 조건이 기기 사양과 맞지 않습니다.");
            }
        }
    }
</script>
</body>
</html>
