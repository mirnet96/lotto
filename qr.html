<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S25 카메라 선택 스캐너</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto flex flex-col gap-4">
        <div class="bg-white p-4 rounded-lg shadow">
            <button id="btnInit" class="w-full bg-blue-600 text-white py-3 rounded font-bold">1. 카메라 목록 불러오기</button>
            
            <select id="cameraSelect" class="w-full mt-4 p-2 border rounded">
                <option value="">카메라를 선택하세요</option>
            </select>
            
            <button id="btnStart" class="w-full mt-2 bg-green-600 text-white py-3 rounded font-bold">2. 선택한 카메라로 스캔 시작</button>
            
            <div id="reader" class="w-full mt-4 bg-black rounded overflow-hidden" style="min-height: 300px;"></div>
        </div>
        <div class="bg-gray-800 text-white p-4 rounded-lg h-32 overflow-y-auto font-mono text-xs" id="log"></div>
    </div>

    <script>
        const log = (m) => { document.getElementById('log').innerHTML += `<div>> ${m}</div>`; };
        const html5QrCode = new Html5Qrcode("reader");
        let devices = [];

        // 1. 카메라 목록 불러오기
        document.getElementById('btnInit').onclick = async () => {
            try {
                devices = await Html5Qrcode.getCameras();
                const select = document.getElementById('cameraSelect');
                select.innerHTML = '';
                
                devices.forEach((d, i) => {
                    const option = document.createElement('option');
                    option.value = d.id;
                    option.text = d.label || `카메라 ${i}`;
                    select.appendChild(option);
                });
                log("카메라 목록 로드 완료");
            } catch (e) { log("권한 오류: " + e.message); }
        };

        // 2. 선택된 카메라로 스캔 시작
        document.getElementById('btnStart').onclick = async () => {
            const cameraId = document.getElementById('cameraSelect').value;
            if (!cameraId) return alert("카메라를 먼저 선택하세요.");

            if (html5QrCode.isScanning) await html5QrCode.stop();

            await html5QrCode.start(
                { deviceId: { exact: cameraId } },
                { 
                    fps: 15, 
                    qrbox: 250,
                    videoConstraints: { width: { ideal: 1920 }, height: { ideal: 1080 } } 
                },
                (t) => { alert("인식 성공: " + t); }
            );
            log("스캔 중: " + cameraId);
        };
    </script>
</body>
</html>
