<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S25 전용 스마트 스캐너</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto flex flex-col gap-4">
        <div class="bg-white p-4 rounded-lg shadow">
            <h2 class="text-lg font-bold mb-4">카메라 설정</h2>
            <button id="btnInit" class="w-full bg-blue-600 text-white py-2 rounded font-bold mb-2">카메라 목록 새로고침</button>
            <select id="cameraSelect" class="w-full p-2 border rounded mb-2">
                <option value="">카메라를 선택하세요</option>
            </select>
            <div class="flex gap-2">
                <button id="btnStart" class="flex-1 bg-green-600 text-white py-3 rounded font-bold">스캔 시작</button>
                <button id="btnReset" class="w-20 bg-gray-400 text-white py-3 rounded font-bold">초기화</button>
            </div>
        </div>
        <div id="reader" class="w-full bg-black rounded overflow-hidden" style="min-height: 300px;"></div>
    </div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        const STORAGE_KEY = "last_working_camera_label";

        async function loadCameras() {
            try {
                const devices = await Html5Qrcode.getCameras();
                const select = document.getElementById('cameraSelect');
                const savedLabel = localStorage.getItem(STORAGE_KEY);
                
                select.innerHTML = '<option value="">카메라를 선택하세요</option>';
                let foundMatch = null;

                devices.forEach((d, index) => {
                    const label = d.label || `Camera ${index}`;
                    const option = document.createElement('option');
                    option.value = d.id;
                    option.text = label;
                    select.appendChild(option);

                    // 저장된 이름과 현재 이름이 일치하는지 확인
                    if (label === savedLabel) foundMatch = d.id;
                });

                if (foundMatch) {
                    select.value = foundMatch;
                }
                return devices;
            } catch (e) {
                alert("카메라 권한을 허용해주세요.");
            }
        }

        document.getElementById('btnReset').onclick = () => {
            localStorage.removeItem(STORAGE_KEY);
            alert("설정이 초기화되었습니다.");
            location.reload();
        };

        document.getElementById('btnInit').onclick = loadCameras;

        document.getElementById('btnStart').onclick = async () => {
            const select = document.getElementById('cameraSelect');
            const targetId = select.value;
            const targetLabel = select.options[select.selectedIndex].text;

            if (!targetId) return alert("카메라를 선택하세요.");
            if (html5QrCode.isScanning) await html5QrCode.stop();

            try {
                await html5QrCode.start(
                    { deviceId: { exact: targetId } },
                    { fps: 10, qrbox: 250 },
                    (t) => {
                        // 성공 시 label을 저장
                        localStorage.setItem(STORAGE_KEY, targetLabel);
                        alert("인식 성공: " + t);
                        html5QrCode.stop();
                    }
                );
            } catch (e) {
                alert("카메라 연결 실패. 목록을 새로고침하거나 다른 카메라를 선택하세요.");
                localStorage.removeItem(STORAGE_KEY);
            }
        };

        window.onload = async () => {
            await loadCameras();
            // 로드 직후 저장된 값이 선택되어 있다면 바로 시작
            const savedLabel = localStorage.getItem(STORAGE_KEY);
            const select = document.getElementById('cameraSelect');
            if (savedLabel && select.value) {
                document.getElementById('btnStart').click();
            }
        };
    </script>
</body>
</html>
