<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Scanner Optimized</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        #qr-reader { border: none !important; }
        #qr-reader video { object-fit: cover !important; border-radius: 1.5rem; }
        #qr-reader img { display: none !important; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .scan-line {
            position: absolute; width: 100%; height: 2px;
            background: rgba(79, 70, 229, 0.6); animation: scan 2s linear infinite;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-[100dvh] flex flex-col items-center justify-center p-6 font-sans">

    <div id="welcome-ui" class="w-full max-w-md text-center">
        <div class="mb-6 bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">QR 스캐너</h1>
            <p class="text-slate-500 mt-2 text-sm">최신 스마트폰 및 인앱 브라우저 대응 완료<br>렌즈와 20cm 정도 거리를 유지해 주세요.</p>
            <button id="start-btn" class="mt-8 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95">
                스캔 시작하기
            </button>
        </div>
    </div>

    <div id="scanner-ui" class="hidden w-full max-w-md">
        <div class="relative bg-black rounded-3xl overflow-hidden shadow-2xl aspect-square border-4 border-white">
            <div id="qr-reader" class="w-full h-full"></div>
            <div class="absolute inset-0 pointer-events-none flex items-center justify-center">
                <div class="w-64 h-64 border-2 border-indigo-400/30 rounded-2xl relative overflow-hidden shadow-[0_0_0_999px_rgba(0,0,0,0.5)]">
                    <div class="absolute -top-1 -left-1 w-8 h-8 border-t-4 border-l-4 border-indigo-500 rounded-tl-lg"></div>
                    <div class="absolute -top-1 -right-1 w-8 h-8 border-t-4 border-r-4 border-indigo-500 rounded-tr-lg"></div>
                    <div class="absolute -bottom-1 -left-1 w-8 h-8 border-b-4 border-l-4 border-indigo-500 rounded-bl-lg"></div>
                    <div class="absolute -bottom-1 -right-1 w-8 h-8 border-b-4 border-r-4 border-indigo-500 rounded-br-lg"></div>
                    <div class="scan-line"></div>
                </div>
            </div>
        </div>
        <button id="stop-btn" class="mt-8 w-full py-3 text-slate-500 font-semibold bg-white border border-slate-200 rounded-xl">취소</button>
    </div>

    <div id="result-ui" class="hidden w-full max-w-md bg-white p-6 rounded-3xl shadow-xl border-2 border-indigo-500 text-center">
        <div class="bg-slate-50 p-5 rounded-2xl mb-6 shadow-inner">
            <p id="qr-result" class="text-lg font-bold text-slate-800 break-all"></p>
        </div>
        <button onclick="location.reload()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold">다시 스캔</button>
    </div>

    <script>
        const welcomeUI = document.getElementById('welcome-ui');
        const scannerUI = document.getElementById('scanner-ui');
        const resultUI = document.getElementById('result-ui');
        const resultText = document.getElementById('qr-result');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');

        let html5QrCode = new Html5Qrcode("qr-reader");

        const onScanSuccess = (decodedText) => {
            if (navigator.vibrate) navigator.vibrate(100);
            html5QrCode.stop().then(() => {
                scannerUI.classList.add('hidden');
                resultUI.classList.remove('hidden');
                resultText.innerText = decodedText;
            });
        };

        startBtn.addEventListener('click', async () => {
            welcomeUI.classList.add('hidden');
            scannerUI.classList.remove('hidden');

            try {
                // 1. 카메라 권한 먼저 요청 및 목록 가져오기
                const devices = await Html5Qrcode.getCameras();
                
                if (devices && devices.length > 0) {
                    // 2. 후면 카메라 필터링 (최신 기기는 보통 목록 끝에 메인 카메라가 있음)
                    let backCameras = devices.filter(d => d.label.toLowerCase().includes('back'));
                    let cameraId = backCameras.length > 0 ? backCameras[backCameras.length - 1].id : devices[0].id;

                    const config = {
                        fps: 20,
                        qrbox: { width: 250, height: 250 },
                        aspectRatio: 1.0
                    };

                    // 3. 실행 (실패 시 facingMode로 자동 전환 시도)
                    await html5QrCode.start(cameraId, config, onScanSuccess)
                    .catch(async () => {
                        console.log("ID 방식 실패, facingMode로 재시도...");
                        await html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
                    });
                } else {
                    throw new Error("장치 없음");
                }
            } catch (err) {
                console.error(err);
                alert("브라우저의 카메라 권한이 거부되었거나,\n카카오톡 인앱 브라우저에서 실행 중입니다.\n\n[해결 방법]\n오른쪽 하단 '...' 버튼 클릭 -> '다른 브라우저로 열기' 선택");
                location.reload();
            }
        });

        stopBtn.addEventListener('click', () => {
            html5QrCode.isScanning ? html5QrCode.stop().then(() => location.reload()) : location.reload();
        });
    </script>
</body>
</html>
