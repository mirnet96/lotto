<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR 스캐너 - 최종 통합본</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-lg font-bold mb-4">카메라 설정</h1>
        
        <div id="controls" class="space-y-2 mb-4">
            <button id="btnLoad" class="w-full bg-blue-600 text-white p-3 rounded font-bold">카메라 목록 불러오기</button>
            <button id="btnReset" class="w-full bg-red-500 text-white p-3 rounded font-bold">카메라 설정 초기화(삭제)</button>
        </div>

        <div id="cameraList" class="space-y-2 mb-4"></div>
        <div id="reader" class="w-full bg-black rounded-lg overflow-hidden min-h-[300px]"></div>
        <div id="log" class="mt-4 p-2 bg-gray-900 text-green-400 text-[10px] rounded h-20 overflow-y-auto font-mono"></div>
    </div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        const logDiv = document.getElementById('log');
        function logger(msg) { logDiv.innerHTML += `<div>> ${msg}</div>`; logDiv.scrollTop = logDiv.scrollHeight; }

        // 1. 초기화 버튼
        document.getElementById('btnReset').onclick = () => {
            localStorage.removeItem('lastWorkingCameraId');
            alert("카메라 설정이 초기화되었습니다. 목록을 다시 불러오세요.");
            if(html5QrCode.isScanning) html5QrCode.stop();
        };

        // 2. 목록 불러오기 및 자동 시작 로직
        document.getElementById('btnLoad').onclick = async () => {
            const devices = await Html5Qrcode.getCameras();
            const cameraListDiv = document.getElementById('cameraList');
            cameraListDiv.innerHTML = '';

            const savedId = localStorage.getItem('lastWorkingCameraId');
            
            // 저장된 카메라가 있으면 즉시 자동 시작
            if (savedId && devices.some(d => d.deviceId === savedId)) {
                logger("저장된 카메라 자동 시작...");
                startScan(savedId);
                return;
            }

            // 없으면 목록 보여주기
            devices.forEach(d => {
                const btn = document.createElement('button');
                btn.className = "w-full bg-gray-100 p-3 rounded border text-sm";
                btn.textContent = d.label || "카메라";
                btn.onclick = () => startScan(d.deviceId);
                cameraListDiv.appendChild(btn);
            });
        };

        // 3. 스캔 시작 공통 함수
        async function startScan(deviceId) {
            if (html5QrCode.isScanning) await html5QrCode.stop();
            
            try {
                await html5QrCode.start(
                    { deviceId: { exact: deviceId } },
                    { fps: 5, qrbox: 250 },
                    (text) => {
                        html5QrCode.stop();
                        localStorage.setItem('lastWorkingCameraId', deviceId); // 성공 시 자동 저장
                        alert("인식 성공: " + text);
                    }
                );
                logger("스캔 시작: " + deviceId.slice(0, 8));
            } catch (e) {
                logger("오류: " + e.message);
            }
        }
    </script>
</body>
</html>
