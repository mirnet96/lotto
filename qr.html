<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S25 전용 스마트 스캐너</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto flex flex-col gap-4">
        <div class="bg-white p-4 rounded-lg shadow">
            <h2 class="text-lg font-bold mb-4">카메라 설정</h2>
            
            <button id="btnInit" class="w-full bg-blue-600 text-white py-2 rounded font-bold mb-2">카메라 목록 새로고침</button>
            
            <select id="cameraSelect" class="w-full p-2 border rounded mb-2">
                <option value="">카메라를 선택하세요</option>
            </select>
            
            <div class="flex gap-2">
                <button id="btnStart" class="flex-1 bg-green-600 text-white py-3 rounded font-bold">스캔 시작</button>
                <button id="btnReset" class="w-20 bg-gray-400 text-white py-3 rounded font-bold">초기화</button>
            </div>
        </div>
        
        <div id="reader" class="w-full bg-black rounded overflow-hidden" style="min-height: 300px;"></div>
    </div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        const STORAGE_KEY = "last_working_camera_id";

        // 카메라 목록 로드 및 저장된 ID 자동 선택
        async function loadCameras() {
            try {
                const devices = await Html5Qrcode.getCameras();
                const select = document.getElementById('cameraSelect');
                const savedId = localStorage.getItem(STORAGE_KEY);
                
                select.innerHTML = '<option value="">카메라를 선택하세요</option>';
                
                let savedIdExists = false;
                devices.forEach((d, index) => {
                    const option = document.createElement('option');
                    option.value = d.id;
                    option.text = d.label || `Camera ${index}`;
                    select.appendChild(option);
                    if (d.id === savedId) savedIdExists = true;
                });

                if (savedIdExists) {
                    select.value = savedId;
                }
                return devices;
            } catch (e) {
                console.error("카메라 로드 오류:", e);
                alert("카메라 권한을 확인해주세요.");
            }
        }

        // 초기화 버튼
        document.getElementById('btnReset').onclick = () => {
            localStorage.removeItem(STORAGE_KEY);
            alert("설정이 초기화되었습니다.");
            location.reload();
        };

        // 새로고침 버튼
        document.getElementById('btnInit').onclick = loadCameras;

        // 스캔 시작
        document.getElementById('btnStart').onclick = async () => {
            const select = document.getElementById('cameraSelect');
            const targetId = select.value;

            if (!targetId) {
                alert("카메라를 먼저 선택하세요.");
                return;
            }

            if (html5QrCode.isScanning) await html5QrCode.stop();

            try {
                await html5QrCode.start(
                    { deviceId: { exact: targetId } },
                    { fps: 10, qrbox: 250 },
                    (t) => {
                        localStorage.setItem(STORAGE_KEY, targetId); // 성공 시 ID 저장
                        alert("인식 성공: " + t);
                        html5QrCode.stop();
                    }
                );
            } catch (e) {
                console.error(e);
                alert("카메라 연결 실패. 저장된 설정을 초기화하고 다시 시도하세요.");
                localStorage.removeItem(STORAGE_KEY); // 유효하지 않은 ID 삭제
            }
        };

        // 페이지 로드 시 자동 실행
        window.onload = async () => {
            await loadCameras();
            const savedId = localStorage.getItem(STORAGE_KEY);
            if (savedId && document.getElementById('cameraSelect').value === savedId) {
                // 저장된 카메라가 유효하면 즉시 스캔 시작
                document.getElementById('btnStart').click();
            }
        };
    </script>
</body>
</html>
