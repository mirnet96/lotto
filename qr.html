<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR 스캐너 - 후면 카메라 우선</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-lg font-bold mb-4">후면 QR 스캐너</h1>
        
        <button id="btnAutoScan" class="w-full bg-blue-600 text-white p-4 rounded-lg font-bold text-lg mb-2">스캔 시작하기</button>
        <button id="btnNextCam" class="hidden w-full bg-orange-500 text-white p-3 rounded-lg font-bold mb-4">스캔 안됨 → 다음 후면 카메라로</button>
        
        <div id="reader" class="w-full bg-black rounded-lg overflow-hidden min-h-[300px]"></div>
        <div id="log" class="mt-4 p-3 bg-gray-900 text-green-400 text-[10px] rounded h-32 overflow-y-auto font-mono"></div>
    </div>

<script>
    const html5QrCode = new Html5Qrcode("reader");
    let backCameras = [];
    let currentIndex = 0;

    // 1. 카메라 목록을 가져와서 후면 카메라만 버튼으로 생성
    document.getElementById('btnAutoScan').addEventListener('click', async () => {
        const devices = await Html5Qrcode.getCameras();
        
        // [핵심] 1. 라벨에 'back'이 들어간 것 우선, 
        // 2. 만약 하나도 없으면 전체를 다 가져와서 사용자가 직접 고르게 함 (안전장치)
        backCameras = devices.filter(d => 
            d.label.toLowerCase().includes('back') || 
            d.label.toLowerCase().includes('후면') ||
            devices.length <= 2 // 카메라가 2개뿐이면 둘 다 후보로 등록
        );
        
        if(backCameras.length === 0) backCameras = devices;

        logger(`후면 카메라 ${backCameras.length}개 찾음. 스캔 시작...`);
        startScanByIndex(0);
    });

    async function startScanByIndex(index) {
        if(index >= backCameras.length) return logger("더 이상 카메라가 없습니다.");
        
        currentIndex = index;
        const device = backCameras[index];
        
        try {
            if (html5QrCode.isScanning) await html5QrCode.stop();
            
            await html5QrCode.start(
                { deviceId: { exact: device.deviceId } },
                { fps: 5, qrbox: 250 },
                (text) => {
                    html5QrCode.stop();
                    localStorage.setItem('lastWorkingCameraId', device.deviceId);
                    alert("성공: " + text);
                }
            );
            logger(`현재 카메라: ${device.label || '카메라 ' + index}`);
        } catch (e) {
            logger(`카메라 ${index}번 실패`);
        }
    }

    // 다음 카메라 버튼 클릭 시
    document.getElementById('btnNextCam').addEventListener('click', () => {
        startScanByIndex(currentIndex + 1);
    });
</script>
</body>
</html>
