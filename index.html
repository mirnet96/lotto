<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 생성기 | 통계 기반 AI 추천 - LOTTO+</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.4/html5-qrcode.min.js"></script>
    <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen overflow-x-hidden">
<div id="app" class="flex flex-col min-h-screen">

    <header id="top-nav" class="bg-white border-b border-slate-200 shadow-card sticky top-0 z-50 px-6 h-[60px] flex items-center justify-between">
        </header>

    <main id="content" class="flex-1 max-w-[560px] mx-auto w-full px-4 py-6">
        <section class="page" id="page-qr">
            <div class="mb-5">
                <h2 class="font-display text-[20px] tracking-[2px] text-slate-800">QR 번호 제외 생성</h2>
            </div>
            
            <div class="rounded-2xl overflow-hidden bg-black mb-4 relative min-h-[300px]">
                <div id="reader"></div>
            </div>
            
            <button id="btnAutoScan" class="w-full py-4 rounded-xl bg-blue-600 text-white font-bold mb-3">스캔 시작하기</button>
            <div id="log" class="bg-gray-900 text-green-400 p-2 text-[10px] rounded h-20 overflow-y-auto font-mono mb-4"></div>
        </section>
    </main>

    </div>

<script>
    // 1. 기존 프로젝트의 핵심 변수 및 스크립트 연결
    const html5QrCode = new Html5Qrcode("reader");
    const logDiv = document.getElementById('log');

    function logger(msg) {
        if(logDiv) {
            logDiv.innerHTML += `<div>> ${msg}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
    }

    // 2. 자동 카메라 스캔 로직 (생략 없이 전체 삽입)
    document.getElementById('btnAutoScan').addEventListener('click', async () => {
        logger("장치 검색 중...");
        try {
            const devices = await Html5Qrcode.getCameras();
            const backCameras = devices.filter(d => d.label.toLowerCase().includes('back'));
            
            const savedId = localStorage.getItem('lastWorkingCameraId');
            if (savedId) {
                logger("저장된 카메라 시도...");
                tryScan(savedId);
            } else {
                tryAllCameras(backCameras, 0);
            }
        } catch (e) { logger("권한 에러: " + e.message); }
    });

    async function tryAllCameras(cameras, index) {
        if (index >= cameras.length) { logger("사용 가능한 후면 카메라가 없습니다."); return; }
        const deviceId = cameras[index].deviceId;
        
        try {
            await html5QrCode.start(
                { deviceId: { exact: deviceId } },
                { fps: 5, qrbox: 250 },
                (text) => {
                    html5QrCode.stop();
                    localStorage.setItem('lastWorkingCameraId', deviceId);
                    alert("성공: " + text); // 여기서 기존의 로또 번호 추출 로직으로 연결 가능
                }
            );
        } catch (err) {
            await html5QrCode.stop().catch(e => {});
            tryAllCameras(cameras, index + 1);
        }
    }

    async function tryScan(deviceId) {
        try {
            await html5QrCode.start(
                { deviceId: { exact: deviceId } },
                { fps: 5, qrbox: 250 },
                (text) => { html5QrCode.stop(); alert("성공: " + text); }
            );
        } catch (err) {
            localStorage.removeItem('lastWorkingCameraId');
            const devices = await Html5Qrcode.getCameras();
            tryAllCameras(devices.filter(d => d.label.toLowerCase().includes('back')), 0);
        }
    }
</script>

<script src="./js/state.js"></script>
<script src="./js/storage.js"></script>
<script src="./js/ui.js"></script>
<script src="./js/generator.js"></script>
<script src="./js/qr.js"></script>
<script src="./js/history.js"></script>
<script src="./js/stats.js"></script>
<script src="./js/init.js"></script>
</body>
</html>
