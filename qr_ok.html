<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-50 p-4">
    <div class="max-w-4xl mx-auto flex flex-col md:flex-row gap-4">
        <div class="md:w-1/2 bg-white p-4 rounded-lg shadow">
            <button id="btnInit" class="w-full bg-blue-600 text-white p-3 rounded mb-4 font-bold">카메라 목록 로드</button>
            <div id="cameraList" class="space-y-2 mb-4"></div>
            <div id="reader" class="w-full bg-black rounded"></div>
        </div>
        <div class="md:w-1/2 bg-gray-900 text-green-400 p-4 rounded-lg h-96 overflow-y-auto font-mono text-xs" id="log"></div>
    </div>

    <script>
        const log = (m) => { document.getElementById('log').innerHTML += `<div>> ${m}</div>`; console.log(m); };
        const html5QrCode = new Html5Qrcode("reader");

        document.getElementById('btnInit').onclick = async () => {
            const devs = await Html5Qrcode.getCameras();
            document.getElementById('cameraList').innerHTML = '';
            devs.filter(d => !d.label.toLowerCase().includes('front')).forEach(d => {
                const btn = document.createElement('button');
                btn.className = "w-full bg-gray-200 p-2 text-sm rounded";
                btn.textContent = d.label;
                btn.onclick = () => start(d.deviceId);
                document.getElementById('cameraList').appendChild(btn);
            });
        };

        const start = async (id) => {
            if(html5QrCode.isScanning) await html5QrCode.stop();
            html5QrCode.start({deviceId: {exact: id}}, {fps: 5, qrbox: 250}, (t) => alert("성공: "+t)).catch(e => log(e.message));
        };
    </script>
</body>
</html>
